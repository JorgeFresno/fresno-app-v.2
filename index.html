<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

body {
  background: #f5f5f5;
  color: #111;
}

#app {
  height: 100vh;
}

.app-shell {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

.sidebar {
  width: 240px;
  background: #111;
  color: white;
  display: flex;
  flex-direction: column;
  padding: 20px;
  flex-shrink: 0;
}

.brand {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 30px;
}

.menu {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.menu-btn {
  border: none;
  background: #1d1d1d;
  color: white;
  padding: 14px 16px;
  border-radius: 10px;
  cursor: pointer;
  text-align: left;
  font-size: 15px;
}

.menu-btn.active {
  background: #2f6fed;
}

.main-content {
  flex: 1;
  min-width: 0;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.view-container {
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

.screen {
  height: 100%;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.screen-header {
  padding: 24px;
  background: #fff;
  border-bottom: 1px solid #e5e5e5;
  flex-shrink: 0;
}

.screen-body {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 24px;
  -webkit-overflow-scrolling: touch;
}

.mov-item {
  background: white;
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  border: 1px solid #e5e5e5;
  box-shadow: 0 1px 6px rgba(0,0,0,0.08);
}

.mov-icon-wrap {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f3f3f3;
  font-size: 22px;
  flex-shrink: 0;
}

.mov-body {
  flex: 1;
  min-width: 0;
}

.mov-folio {
  font-size: 14px;
  font-weight: 600;
}

.mov-detail {
  font-size: 12px;
  color: #666;
  margin-top: 2px;
}

.mov-amount {
  text-align: right;
  flex-shrink: 0;
}

.mov-qty {
  font-size: 15px;
  font-weight: 700;
}

.mov-qty.positive {
  color: #4CAF50;
}

.mov-qty.negative {
  color: #d32f2f;
}

.mov-time {
  font-size: 11px;
  color: #888;
  margin-top: 2px;
}

.loading-state,
.empty-state {
  text-align: center;
  padding: 40px;
  color: #777;
}
</style>
  <title>Fresno App</title>
  <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>
  <div id="app"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
